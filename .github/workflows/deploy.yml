name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main
      - "design/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.amplify.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Design System
        run: pnpm ds:build

      - name: Build Web App
        run: pnpm --filter @martech/web build
        env:
          NEXT_PUBLIC_SEGMENT_WRITE_KEY: ${{ secrets.NEXT_PUBLIC_SEGMENT_WRITE_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to Amplify
        id: amplify
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          BRANCH_NAME="${BRANCH_NAME//\//-}"

          echo "Deploying branch: $BRANCH_NAME"

          # Start the deployment
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE

          # Get the app URL
          APP_URL=$(aws amplify get-branch \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name "$BRANCH_NAME" \
            --query 'branch.displayName' \
            --output text 2>/dev/null || echo "pending")

          echo "url=https://${BRANCH_NAME}.${APP_ID}.amplifyapp.com" >> $GITHUB_OUTPUT

      - name: Post deploy summary
        if: success()
        run: |
          echo "## 🚀 Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Amplify App:** \`${{ secrets.AMPLIFY_APP_ID }}\`" >> $GITHUB_STEP_SUMMARY
