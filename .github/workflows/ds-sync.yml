name: Design System Sync

on:
  # Triggered by Figma webhook via repository_dispatch
  repository_dispatch:
    types: [figma-ds-updated]

  # Manual trigger for on-demand sync
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview changes only)"
        required: false
        default: false
        type: boolean

  # Scheduled sync (check for Figma changes daily at 9am UTC)
  schedule:
    - cron: "0 9 * * 1-5"

concurrency:
  group: ds-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync DS from Figma
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Identify trigger source
        id: trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_FILE_KEY: ${{ github.event.client_payload.file_key }}
          PAYLOAD_TRIGGERED_BY: ${{ github.event.client_payload.triggered_by }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "source=figma-webhook" >> $GITHUB_OUTPUT
            echo "file_key=${PAYLOAD_FILE_KEY}" >> $GITHUB_OUTPUT
            echo "triggered_by=${PAYLOAD_TRIGGERED_BY}" >> $GITHUB_OUTPUT
            echo "Triggered by Figma webhook (file: ${PAYLOAD_FILE_KEY})"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            echo "source=schedule" >> $GITHUB_OUTPUT
            echo "Triggered by daily schedule"
          else
            echo "source=manual" >> $GITHUB_OUTPUT
            echo "Triggered manually"
          fi

      - name: Run Figma Sync
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm --filter @martech/design-system sync:check
          else
            pnpm ds:sync
          fi
        env:
          FIGMA_API_TOKEN: ${{ secrets.FIGMA_API_TOKEN }}
          FIGMA_DS_FILE_KEY: ${{ github.event.client_payload.file_key || secrets.FIGMA_DS_FILE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}

      - name: Build Design System
        if: ${{ inputs.dry_run != 'true' }}
        run: pnpm ds:build

      - name: Check for changes
        if: ${{ inputs.dry_run != 'true' }}
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="ds-sync/$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(design-system): sync components from Figma

          Automated sync via GitHub Actions.
          Components and AI docs updated from Figma Design System file."

          git push origin "$BRANCH"

          gh pr create \
            --title "chore(ds): sync components from Figma — $(date +%Y-%m-%d)" \
            --body "## Design System Sync

          Automated sync of component code and AI documentation from the Figma Design System file.

          ### What changed
          - Component code updated to match latest Figma designs
          - AI documentation (.doc.ts) regenerated for changed components
          - Barrel exports (index.ts) regenerated

          ### Review checklist
          - [ ] Component visual appearance matches Figma
          - [ ] AI docs accurately describe props and slots
          - [ ] No breaking API changes to existing components
          - [ ] \`pnpm ds:build\` succeeds

          🤖 Generated by [DS Sync GitHub Action]" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post sync summary
        run: |
          echo "## 🎨 Design System Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ steps.trigger.outputs.source }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.trigger.outputs.triggered_by }}" ]; then
            echo "**Changed by:** ${{ steps.trigger.outputs.triggered_by }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "**Result:** Dry run (no changes written)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "**Result:** Changes detected — PR created" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result:** No changes — everything up to date" >> $GITHUB_STEP_SUMMARY
          fi
