version: 1

applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            # Use Node 22 (Amplify defaults to 18)
            - nvm install 22
            - nvm use 22
            - node --version

            # Install pnpm (exact version matching packageManager field)
            - npm install -g pnpm@9.15.0
            - pnpm --version

            # Debug: verify monorepo root is reachable
            - echo "appRoot CWD=$(pwd)" && echo "monorepo root=$(cd ../.. && pwd)" && ls ../../package.json

            # Install deps + build DS in one command (CWD resets between commands)
            - cd ../.. && pnpm install --frozen-lockfile && pnpm ds:build

        build:
          commands:
            - cd ../.. && pnpm --filter @martech/web build

      artifacts:
        baseDirectory: .next
        files:
          - "**/*"

      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
          - ../../packages/design-system/dist/**/*

      buildSizeConfig:
        maxIndividualAsset: 50000000

    # Environment variables — set in Amplify Console
    # FIGMA_API_TOKEN, FIGMA_DS_FILE_KEY, FIGMA_WEBHOOK_SECRET
    # OPENAI_API_KEY, OPENAI_MODEL, NEXT_PUBLIC_SEGMENT_WRITE_KEY, GITHUB_TOKEN
