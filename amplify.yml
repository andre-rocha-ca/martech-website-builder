version: 1

applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            # Use Node 22 (Amplify defaults to 18)
            - nvm install 22
            - nvm use 22
            - node --version

            # Enable corepack for pnpm (reads version from root package.json packageManager field)
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - pnpm --version

            # Install dependencies from monorepo root
            - cd ../.. && pnpm install --frozen-lockfile

            # Build the design system (dependency of web app)
            - cd ../.. && pnpm ds:build

        build:
          commands:
            - cd ../.. && pnpm --filter @martech/web build

      artifacts:
        baseDirectory: .next
        files:
          - "**/*"

      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
          - ../../packages/design-system/dist/**/*

      buildSizeConfig:
        maxIndividualAsset: 50000000

    # Environment variables — set in Amplify Console
    # FIGMA_API_TOKEN, FIGMA_DS_FILE_KEY, FIGMA_WEBHOOK_SECRET
    # OPENAI_API_KEY, OPENAI_MODEL, NEXT_PUBLIC_SEGMENT_WRITE_KEY, GITHUB_TOKEN
