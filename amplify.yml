version: 1

applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - npm install -g pnpm
            - pnpm install --frozen-lockfile
            - pnpm ds:build
        build:
          commands:
            - pnpm --filter @martech/web build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
