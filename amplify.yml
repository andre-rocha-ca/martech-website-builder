version: 1

applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            # Install pnpm and dependencies for the full monorepo
            - npm install -g pnpm@9
            - cd ../.. && pnpm install --frozen-lockfile
            # Build the design system first (dependency of web)
            - cd ../.. && pnpm ds:build
        build:
          commands:
            - cd ../.. && pnpm --filter @martech/web build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
      buildSizeConfig:
        maxIndividualAsset: 50000000

    # Environment variable mapping:
    # Set these in Amplify Console → App settings → Environment variables
    # - FIGMA_API_TOKEN
    # - FIGMA_DS_FILE_KEY
    # - FIGMA_WEBHOOK_SECRET
    # - OPENAI_API_KEY
    # - OPENAI_MODEL
    # - NEXT_PUBLIC_SEGMENT_WRITE_KEY
    # - GITHUB_TOKEN

    # Branch deployment rules:
    # main        → Production
    # design/*    → Preview environments (auto-created per design branch)
